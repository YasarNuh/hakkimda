<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yaşar Nuh Donma</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background: radial-gradient(circle at top left,#1e1e1e,#050505 70%);
    position:relative;
}

/* Arka plan glow */

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:rgba(0,140,255,0.12);
    border-radius:50%;
    filter:blur(120px);
    top:-150px;
    left:-150px;
}

body::after{
    content:"";
    position:absolute;
    width:450px;
    height:450px;
    background:rgba(255,255,255,0.04);
    border-radius:50%;
    filter:blur(120px);
    bottom:-150px;
    right:-150px;
}

/* ANA ALAN */

.container{
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
}

/* BAŞLIK */

.name{
    color:white;
    font-size:32px;
    letter-spacing:3px;
    text-align:center;
}

.bio{
    color:#bdbdbd;
    margin-top:-10px;
}

/* LINK BUTON */

.link-btn{
    width:320px;
    padding:18px;
    border-radius:18px;
    background:rgba(255,255,255,0.08);
    color:white;
    text-decoration:none;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:0.25s;
    backdrop-filter:blur(12px);
}

.link-btn:hover{
    transform:scale(1.05);
    background:rgba(255,255,255,0.14);
}

/* HAKKIMDA BUTON */

.about-btn{
    position:absolute;
    top:20px;
    left:20px;
    padding:12px 18px;
    border:none;
    border-radius:14px;
    background:rgba(255,255,255,0.08);
    color:white;
    cursor:pointer;
    z-index:5;
}

.about-btn:hover{
    background:rgba(255,255,255,0.14);
}

/* POPUP */

.popup{
    position:absolute;
    top:80px;
    left:20px;
    width:280px;
    padding:22px;
    border-radius:20px;
    background:rgba(10,10,10,0.92);
    color:white;
    display:none;
    z-index:10;
}

.popup p{
    margin:10px 0;
    color:#ccc;
}

.close-btn{
    margin-top:15px;
    padding:8px 14px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
    cursor:pointer;
}

/* RESPONSIVE */

@media(max-width:500px){
    .link-btn{ width:280px; }
}

</style>
</head>

<body>

<!-- HAKKIMDA BUTONU -->
<button class="about-btn" onclick="openPopup()">☰ Hakkımda</button>

<!-- POPUP -->
<div class="popup" id="popup">

    <h2>Hakkımda</h2>

    <p><strong>İsim:</strong> Yaşar Nuh Donma</p>
    <p><strong>Yaş:</strong> 18</p>
    <p><strong>Doğum:</strong> 15 Ağustos 2007</p>
    <p><strong>Boy:</strong> 190</p>
    <p><strong>Kilo:</strong> 70</p>

    <button class="close-btn" onclick="closePopup()">Kapat</button>

</div>

<!-- ANA -->

<div class="container">

    <img src="profil.jpg" class="profile-img">

    <h1 class="name">YAŞAR NUH DONMA</h1>

    <p class="bio">BOX  -  Vücüt Geliştirme  -  CS2 Player</p>
    
    <a class="link-btn" href="https://open.spotify.com/user/31m754rveers3rxlu5sh7qsgcmzu" target="_blank">
        🎵 Spotify
    </a>

    <a class="link-btn" href="https://music.youtube.com/@yasarnuh7571" target="_blank">
        ▶️ YouTube Music
    </a>

    <a class="link-btn" href="https://steamcommunity.com/profiles/76561199214229444" target="_blank">
        🎮 Steam
    </a>

    <a class="link-btn" href="https://x.com/donma_nuh20630" target="_blank">
        🐦 Twitter
    </a>

</div>

<script>

function openPopup(){
    document.getElementById("popup").style.display = "block";
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}

</script>

</body>
</html>
